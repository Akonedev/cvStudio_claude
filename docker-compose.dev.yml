# ─────────────────────────────────────────────────────────────────────────────
#  CV Studio Claude — Docker Compose DEV (DB + pgAdmin only)
#  Next.js runs locally via: npm run dev
#  Usage: docker compose -f docker-compose.dev.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

name: cvstudio_claude_dev

networks:
  cvStudio_Claude_network:
    driver: bridge

volumes:
  cvStudio_Claude_postgres_data:
  cvStudio_Claude_pgadmin_data:

services:

  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  cvStudio_Claude_postgres:
    image: postgres:16-alpine
    container_name: cvStudio_Claude_postgres
    restart: unless-stopped
    ports:
      - "12451:5432"
    environment:
      POSTGRES_DB: cvstudio
      POSTGRES_USER: cvstudio_user
      POSTGRES_PASSWORD: cvstudio_pass123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - cvStudio_Claude_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cvStudio_Claude_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvstudio_user -d cvstudio"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin 4 ──────────────────────────────────────────────────────────────
  cvStudio_Claude_pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cvStudio_Claude_pgadmin
    restart: unless-stopped
    ports:
      - "12452:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cvstudio.fr
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - cvStudio_Claude_pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - cvStudio_Claude_network
    depends_on:
      cvStudio_Claude_postgres:
        condition: service_healthy
