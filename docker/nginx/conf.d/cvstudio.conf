# CV Studio Claude — Nginx upstream configuration

upstream cvstudio_app {
    server cvStudio_Claude_app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Health check
    location /nginx-health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Stripe webhook — no buffering to preserve raw body
    location /api/webhooks/stripe {
        proxy_pass http://cvstudio_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Next.js static assets — aggressive caching
    location /_next/static/ {
        proxy_pass http://cvstudio_app;
        proxy_http_version 1.1;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Main app proxy
    location / {
        proxy_pass http://cvstudio_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
